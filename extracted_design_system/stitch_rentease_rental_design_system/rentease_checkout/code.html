<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RentEase - Checkout</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&amp;family=Manrope:wght@400;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "outline-variant": "#d7c2ba",
                      "surface-tint": "#875135",
                      "background": "#fff8f5",
                      "on-secondary-fixed": "#1f1b13",
                      "surface-variant": "#e9e1dc",
                      "on-tertiary-container": "#2e2e2b",
                      "inverse-surface": "#34302c",
                      "surface-dim": "#e1d8d4",
                      "surface-container-low": "#fbf2ed",
                      "on-tertiary-fixed": "#1c1c19",
                      "on-error": "#ffffff",
                      "on-primary": "#ffffff",
                      "inverse-on-surface": "#f8efea",
                      "on-secondary-container": "#686257",
                      "primary-fixed-dim": "#feb694",
                      "error": "#ba1a1a",
                      "tertiary": "#5f5e5b",
                      "on-secondary": "#ffffff",
                      "primary-fixed": "#ffdbcc",
                      "outline": "#85746c",
                      "on-background": "#1e1b18",
                      "on-primary-container": "#4c220a",
                      "surface-bright": "#fff8f5",
                      "error-container": "#ffdad6",
                      "secondary": "#645d53",
                      "inverse-primary": "#feb694",
                      "surface-container-high": "#efe6e2",
                      "on-surface-variant": "#52443d",
                      "secondary-fixed": "#ebe1d4",
                      "on-primary-fixed-variant": "#6b3a20",
                      "on-secondary-fixed-variant": "#4c463c",
                      "primary-container": "#c68667",
                      "tertiary-fixed": "#e5e2dd",
                      "surface-container": "#f5ece7",
                      "on-error-container": "#93000a",
                      "on-surface": "#1e1b18",
                      "on-primary-fixed": "#351000",
                      "secondary-fixed-dim": "#cfc5b9",
                      "surface": "#fff8f5",
                      "surface-container-lowest": "#ffffff",
                      "tertiary-fixed-dim": "#c8c6c2",
                      "primary": "#875135",
                      "tertiary-container": "#969591",
                      "secondary-container": "#e8ded1",
                      "surface-container-highest": "#e9e1dc",
                      "on-tertiary-fixed-variant": "#474743",
                      "on-tertiary": "#ffffff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-max": "1280px",
                      "xs": "4px",
                      "sm": "12px",
                      "gutter": "24px",
                      "lg": "48px",
                      "base": "8px",
                      "md": "24px",
                      "xl": "80px",
                      "margin-mobile": "16px"
              },
              "fontFamily": {
                      "headline-lg": ["DM Serif Display"],
                      "body-sm": ["Manrope"],
                      "label-lg": ["Manrope"],
                      "headline-sm": ["DM Serif Display"],
                      "display-lg": ["DM Serif Display"],
                      "body-md": ["Manrope"],
                      "label-md": ["Manrope"],
                      "body-lg": ["Manrope"],
                      "headline-md": ["DM Serif Display"]
              },
              "fontSize": {
                      "headline-lg": ["40px", {"lineHeight": "48px", "fontWeight": "400"}],
                      "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                      "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "headline-sm": ["24px", {"lineHeight": "32px", "fontWeight": "400"}],
                      "display-lg": ["56px", {"lineHeight": "64px", "letterSpacing": "-0.02em", "fontWeight": "400"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                      "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                      "headline-md": ["32px", {"lineHeight": "40px", "fontWeight": "400"}]
              }
            }
          }
        }
    </script>
<style>
        body { background-color: theme('colors.background'); color: theme('colors.on-surface'); }
        .checkout-step.active { border-color: theme('colors.primary-container'); }
        .checkout-step.active .step-indicator { background-color: theme('colors.primary-container'); color: theme('colors.on-primary'); }
        .checkout-step.completed .step-indicator { background-color: theme('colors.secondary-container'); color: theme('colors.on-secondary-container'); }
        .input-field {
            width: 100%; padding: theme('spacing.sm'); border: 1px solid theme('colors.secondary-container');
            border-radius: theme('borderRadius.DEFAULT'); background-color: theme('colors.surface-container-low');
            color: theme('colors.on-surface'); font-family: theme('fontFamily.body-md'); font-size: 16px; transition: border-color 0.2s;
        }
        .input-field:focus { outline: none; border-color: theme('colors.primary-container'); }
    </style>
</head>
<body class="font-body-md min-h-screen flex flex-col">
<!-- TopNavBar Suppressed: Transactional intent (Checkout) -->
<main class="flex-grow max-w-container-max mx-auto w-full px-margin-mobile md:px-lg py-lg md:py-xl flex flex-col lg:flex-row gap-gutter">
<!-- Left: Checkout Forms -->
<div class="flex-1 space-y-md w-full">
<div class="mb-lg">
<h1 class="font-headline-lg text-headline-lg mb-xs">Checkout</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Complete your rental order.</p>
</div>
<!-- Step 1: Delivery Details -->
<div class="checkout-step active bg-surface-container-lowest p-md rounded-lg shadow-sm border border-primary-container">
<div class="flex items-center gap-sm mb-md">
<div class="step-indicator w-8 h-8 rounded-full flex items-center justify-center font-label-lg text-label-lg bg-primary-container text-on-primary">1</div>
<h2 class="font-headline-sm text-headline-sm">Delivery Details</h2>
</div>
<form class="space-y-sm">
<div class="grid grid-cols-1 md:grid-cols-2 gap-sm">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">First Name</label>
<input class="input-field" placeholder="Jane" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Last Name</label>
<input class="input-field" placeholder="Doe" type="text"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Street Address</label>
<input class="input-field" placeholder="123 Serenity Lane" type="text"/>
</div>
<div class="grid grid-cols-2 md:grid-cols-3 gap-sm">
<div class="col-span-2 md:col-span-1">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">City</label>
<input class="input-field" placeholder="Seattle" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">State</label>
<select class="input-field appearance-none bg-surface-container-low">
<option>WA</option>
<option>CA</option>
</select>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Zip Code</label>
<input class="input-field" placeholder="98101" type="text"/>
</div>
</div>
<div class="pt-sm">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Preferred Delivery Date</label>
<input class="input-field w-full md:w-1/2" type="date"/>
</div>
</form>
</div>
<!-- Step 2: Payment (Inactive visually for this mockup) -->
<div class="checkout-step bg-surface-container-lowest p-md rounded-lg border border-outline-variant/30 opacity-70 hover:opacity-100 transition-opacity">
<div class="flex items-center gap-sm">
<div class="step-indicator w-8 h-8 rounded-full flex items-center justify-center font-label-lg text-label-lg bg-secondary-container text-on-secondary-container">2</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface-variant">Payment Method</h2>
</div>
</div>
<!-- Step 3: Order Summary (Inactive visually) -->
<div class="checkout-step bg-surface-container-lowest p-md rounded-lg border border-outline-variant/30 opacity-70 hover:opacity-100 transition-opacity">
<div class="flex items-center gap-sm">
<div class="step-indicator w-8 h-8 rounded-full flex items-center justify-center font-label-lg text-label-lg bg-secondary-container text-on-secondary-container">3</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface-variant">Review Order</h2>
</div>
</div>
</div>
<!-- Right: Sticky Rental Summary -->
<aside class="w-full lg:w-[400px]">
<div class="bg-surface-container-lowest p-md rounded-lg shadow-[0px_4px_20px_rgba(45,41,38,0.04)] sticky top-gutter border border-secondary-container">
<h3 class="font-headline-sm text-headline-sm border-b border-outline-variant/30 pb-sm mb-sm">Rental Summary</h3>
<div class="flex gap-sm mb-md items-center">
<img class="w-20 h-20 object-cover rounded-md border border-secondary-container" data-alt="A modern minimalist Japandi style lounge chair with light wood frame and cream fabric upholstery, set against a soft off-white background with subtle natural lighting, showcasing premium craftsmanship." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBPTadOh-L7e6Pfg-6iKDba9zqMm4_aKRN8snuFycvl4-E6fpmHDIYqE7Nhi3F2xdU-Y2eF7-lhQB2eFxmAPs6tdk9oAptTQjDWa_9pOQgK-GEp2DcNc4tOCzjhr308_Jn8St4bGBx_tk6wuJ3g96jiERM5XnVfFHi_cg9nf66PlNbsJus28tR-1WpHFqP283LUqNjh8Bo_LrLfJVRdz-lcu5rUG7uPyzRF5YdCFxBP3zI_f7SZuEIWnQ"/>
<div>
<p class="font-label-lg text-label-lg">Nara Lounge Chair</p>
<p class="font-body-sm text-body-sm text-on-surface-variant">12 Month Term</p>
</div>
</div>
<div class="space-y-xs border-b border-outline-variant/30 pb-sm mb-sm">
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Monthly Rent</span>
<span>$45.00</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Security Deposit (Refundable)</span>
<span>$90.00</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Delivery Fee</span>
<span>$25.00</span>
</div>
<div class="flex justify-between font-body-md text-body-md text-on-surface-variant">
<span>Taxes</span>
<span>$12.50</span>
</div>
</div>
<div class="flex justify-between items-end mb-md">
<span class="font-label-lg text-label-lg">Total Due Today</span>
<span class="font-headline-sm text-headline-sm text-primary">$172.50</span>
</div>
<button class="w-full bg-primary-container text-on-primary font-label-lg text-label-lg py-sm rounded-lg hover:bg-surface-tint transition-colors">
                    Continue to Payment
                </button>
<div class="mt-sm flex items-center justify-center gap-xs text-on-surface-variant font-body-sm text-body-sm">
<span class="material-symbols-outlined" style="font-size: 16px;">lock</span>
                    Secure SSL Checkout
                </div>
</div>
</aside>
</main>
<!-- Footer Suppressed for Checkout flow focus -->
</body></html>
